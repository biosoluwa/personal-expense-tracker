<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>EXPENSE TRACKER</h1>
        <p id="total-spent-p">Total Spent: $0.00</p>
    </header>

    <section class="section-one">
        <h2>Add New Transaction</h2>
        <form action="">
            <div>
                <label for="description">Description</label>
                <input type="text" id="description" name="description" placeholder="Describe your expense">
            </div>
            <div>
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount" placeholder="$50">
            </div>
            <div>
                <label for="category">Select the category</label>
                <select name="category" id="category">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>
            <button>Log Expense</button>
        </form>
    </section>

    <section>
        <h2>Transaction History</h2>
        <p id="hide-text">No Expense Yet</p>
        <table class="hidden">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody id="expense-body"></tbody>
        </table>
    </section>
   <script src="script.js"></script> 
</body>
</html>
